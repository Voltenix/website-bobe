<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bobe Florian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e4e9ff;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c79bff 0%, #ffb2dc 50%, #98cdff 100%);
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 48px;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    nav a {
      display: block;
      padding: 16px 24px;
      background: #fff;
      border-radius: 14px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    nav a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    nav a span {
      font-size: 13px;
      color: #999;
      display: block;
      margin-top: 2px;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <div class="logo"></div>
  <h1>Bobe Florian</h1>
  <p class="subtitle">Sélectionne une section</p>

  <nav>
    <a href="coaching.html">
      Coaching
      <span>Sessions de coaching personnalisé</span>
    </a>
    <a href="commission.html">
      Commission
      <span>Demande de commission</span>
    </a>
    <a href="galerie.html">
      Galerie
      <span>Portfolio & réalisations</span>
    </a>
    <a href="avis.html">
      Avis
      <span>Témoignages clients</span>
    </a>
    <a href="cgv-faq.html">
      CGV & FAQ
      <span>Conditions générales & questions fréquentes</span>
    </a>
  </nav>

</body>
</html>
